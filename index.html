<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz - 25 April 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4ff;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px}
.container{width:100%;max-width:680px;background:#fff;border-radius:20px;padding:28px 24px;box-shadow:0 8px 32px rgba(0,0,0,.08)}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:1.5rem;color:#1a1a2e;margin-bottom:4px}
.header p{font-size:.85rem;color:#888}
.progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.progress-bar{flex:1;height:8px;background:#e8eeff;border-radius:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#4f7cff,#a078ff);width:0%;transition:width .4s ease;border-radius:8px}
.progress-text{font-size:.75rem;color:#888;white-space:nowrap}
.card{transition:opacity .3s,transform .3s}
.card.hidden{display:none}
.q-type{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:#a078ff;font-weight:600;margin-bottom:4px}
.q-num{font-size:.75rem;color:#888;margin-bottom:10px}
.question{font-size:1.05rem;color:#1a1a2e;margin-bottom:16px;line-height:1.5}
.options{display:flex;flex-direction:column;gap:8px}
.option{padding:12px 16px;border:2px solid #e8eeff;border-radius:12px;cursor:pointer;font-size:.95rem;color:#333;transition:all .2s;user-select:none}
.option:hover{background:#f0f4ff;border-color:#a078ff}
.option.selected{background:#e8eeff;border-color:#4f7cff;color:#1a1a2e}
.option.correct{background:#d4edda;border-color:#28a745;color:#155724}
.option.wrong{background:#f8d7da;border-color:#dc3545;color:#721c24}
.option.disabled{pointer-events:none;opacity:.7}
.btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#4f7cff,#a078ff);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:20px;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.review h2{font-size:1.1rem;color:#1a1a2e;margin:16px 0 8px;border-bottom:2px solid #e8eeff;padding-bottom:6px}
.review-item{margin-bottom:16px;padding:14px;border-radius:12px;background:#f9faff}
.review-q{font-size:.95rem;color:#1a1a2e;margin-bottom:6px}
.review-ans{font-size:.85rem;color:#28a745;font-weight:600}
.review-wrong{font-size:.85rem;color:#dc3545}
.your-ans{font-size:.8rem;color:#888;margin-top:4px}
.end-screen{text-align:center;padding:20px 0}
.end-screen .score{font-size:3rem;font-weight:700;background:linear-gradient(135deg,#4f7cff,#a078ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.end-screen .total{font-size:1rem;color:#888;margin-top:4px}
.end-screen .pass{font-size:1.1rem;color:#28a745;font-weight:600;margin-top:12px}
.end-screen .fail{font-size:1.1rem;color:#dc3545;font-weight:600;margin-top:12px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Quiz - Keeva</h1>
<p>25 April 2026 - Units 11 and 12: Volume and Picture Graphs</p>
</div>
<div class="progress-wrap">
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<span class="progress-text" id="progressText">1 / 55</span>
</div>
<div id="quiz"></div>
</div>
<script>
const allQuestions = [
  { type: "mc", text: "In a picture graph, each star = 4 points. A team has 5 stars. How many points?", options: { "A": "5 points", "B": "9 points", "C": "20 points", "D": "4 points" }, correct: "A", points: 2 },
  { type: "mc", text: "Container P has 11 ℓ. Container Q has 6 ℓ. P has ___ ℓ more than Q.", options: { "A": "5 ℓ", "B": "6 ℓ", "C": "11 ℓ", "D": "17 ℓ" }, correct: "A", points: 2 },
  { type: "mc", text: "A jug holds 2 ℓ more than a glass. The glass holds 3 ℓ. The jug holds ___ ℓ.", options: { "A": "2 ℓ", "B": "3 ℓ", "C": "5 ℓ", "D": "1 ℓ" }, correct: "A", points: 2 },
  { type: "mc", text: "A tally chart shows: books = 25, pencils = 15. How many items altogether?", options: { "A": "25 items", "B": "15 items", "C": "40 items", "D": "10 items" }, correct: "A", points: 2 },
  { type: "mc", text: "A tally shows: bike = 15, running = 10. How many MORE for bike?", options: { "A": "5 more", "B": "10 more", "C": "25 more", "D": "None" }, correct: "A", points: 2 },
  { type: "mc", text: "A barrel has 15 ℓ of oil. 7 ℓ is poured out. How much remains?", options: { "A": "7 ℓ", "B": "8 ℓ", "C": "15 ℓ", "D": "22 ℓ" }, correct: "A", points: 2 },
  { type: "mc", text: "If Container A has 8 ℓ and we pour 3 ℓ into B, how much is left in A?", options: { "A": "3 ℓ", "B": "5 ℓ", "C": "8 ℓ", "D": "11 ℓ" }, correct: "A", points: 2 },
  { type: "mc", text: "Tank A: 13 ℓ, Tank B: 8 ℓ less than A. Tank B has ___ ℓ.", options: { "A": "5 ℓ", "B": "8 ℓ", "C": "13 ℓ", "D": "21 ℓ" }, correct: "A", points: 2 },
  { type: "mc", text: "If you have 20 ℓ and divide equally into 4 containers, each has ___ ℓ.", options: { "A": "4 ℓ", "B": "5 ℓ", "C": "6 ℓ", "D": "24 ℓ" }, correct: "A", points: 2 },
  { type: "mc", text: "In a picture graph, each shape stands for 5 minutes. Sam spent 3 shapes swimming. How many minutes?", options: { "A": "10 minutes", "B": "15 minutes", "C": "20 minutes", "D": "5 minutes" }, correct: "A", points: 2 },
  { type: "mc", text: "Three tanks have 4 ℓ, 6 ℓ, and 8 ℓ. Total volume is ___ ℓ.", options: { "A": "14 ℓ", "B": "18 ℓ", "C": "10 ℓ", "D": "24 ℓ" }, correct: "A", points: 2 },
  { type: "mc", text: "In a picture graph, fish represents 2 fish. 9 fish = ___ fish.", options: { "A": "9 fish", "B": "11 fish", "C": "18 fish", "D": "20 fish" }, correct: "A", points: 2 },
  { type: "mc", text: "Each dot = 5 children. 5 dots = ___ children.", options: { "A": "5 children", "B": "8 children", "C": "15 children", "D": "3 children" }, correct: "A", points: 2 },
  { type: "mc", text: "Sarah recorded 35 fishballs in a month. Each circle = 5 fishballs. How many circles?", options: { "A": "6 circles", "B": "7 circles", "C": "8 circles", "D": "35 circles" }, correct: "A", points: 2 },
  { type: "mc", text: "A picture graph shows: Kai 12 cans, Ella 8 cans, Chris 16 cans. Who collected the MOST?", options: { "A": "Kai", "B": "Ella", "C": "Chris", "D": "Kai and Chris tied" }, correct: "A", points: 2 },
  { type: "mc", text: "Each star = 10 minutes. Sam studied for 4 stars. He studied for ___ minutes.", options: { "A": "4 minutes", "B": "10 minutes", "C": "40 minutes", "D": "14 minutes" }, correct: "A", points: 2 },
  { type: "mc", text: "Container A has 5 ℓ of water. Container B has 3 ℓ less than A. How much in B?", options: { "A": "2 ℓ", "B": "3 ℓ", "C": "8 ℓ", "D": "5 ℓ" }, correct: "A", points: 2 },
  { type: "mc", text: "Compare: 7 ℓ ___ 9 ℓ. Fill in with > or <.", options: { "A": "7 ℓ < 9 ℓ", "B": "7 ℓ > 9 ℓ", "C": "7 ℓ = 9 ℓ", "D": "7 ℓ >= 9 ℓ" }, correct: "A", points: 2 },
  { type: "mc", text: "A tally chart shows butterflies = 20. Each checkmark = 2. How many checkmarks for butterflies?", options: { "A": "10 checkmarks", "B": "20 checkmarks", "C": "5 checkmarks", "D": "40 checkmarks" }, correct: "A", points: 2 },
  { type: "mc", text: "Which container has the GREATEST volume if A=7ℓ, B=4ℓ, C=9ℓ?", options: { "A": "Container A", "B": "Container B", "C": "Container C", "D": "All equal" }, correct: "A", points: 2 },
  { type: "mc", text: "Each symbol stands for 3 friends. 6 symbols means ___ friends.", options: { "A": "6 friends", "B": "9 friends", "C": "18 friends", "D": "3 friends" }, correct: "A", points: 2 },
  { type: "mc", text: "Picture graph: boy = 8 marbles, girl = 12 marbles, boy2 = 6 marbles. Who has the FEWEST?", options: { "A": "boy", "B": "girl", "C": "boy2", "D": "boy and boy2 tied" }, correct: "A", points: 2 },
  { type: "mc", text: "The water in Jug A fills 6 glasses. Jug B fills 4 glasses. Which has greater volume?", options: { "A": "Jug A", "B": "Jug B", "C": "Equal", "D": "Cannot tell" }, correct: "A", points: 2 },
  { type: "mc", text: "Each ball = 6 points. Team A = 4 balls, Team B = 7 balls. Difference?", options: { "A": "3 points", "B": "11 points", "C": "18 points", "D": "42 points" }, correct: "A", points: 2 },
  { type: "mc", text: "Which is the SMALLEST volume: 6 ℓ, 9 ℓ, 3 ℓ, 7 ℓ?", options: { "A": "3 ℓ", "B": "6 ℓ", "C": "7 ℓ", "D": "9 ℓ" }, correct: "A", points: 2 },
  { type: "mc", text: "Container X has twice the volume of Container Y which has 5 ℓ. X has ___ ℓ.", options: { "A": "5 ℓ", "B": "10 ℓ", "C": "2 ℓ", "D": "7 ℓ" }, correct: "A", points: 2 },
  { type: "mc", text: "Min bought fruits: apples = 12, bananas = 8, oranges = 16. Total fruits?", options: { "A": "28 fruits", "B": "36 fruits", "C": "20 fruits", "D": "24 fruits" }, correct: "A", points: 2 },
  { type: "mc", text: "What is volume measured in?", options: { "A": "Litre", "B": "Kilogram", "C": "Metre", "D": "Gram" }, correct: "A", points: 2 },
  { type: "mc", text: "Tank A has 12 ℓ. Tank B has 4 ℓ more than A. Tank B has ___ ℓ.", options: { "A": "8 ℓ", "B": "12 ℓ", "C": "16 ℓ", "D": "4 ℓ" }, correct: "A", points: 2 },
  { type: "mc", text: "Picture graph: Swimming 30 min, Running 20 min, Cycling 40 min. Which activity took the MOST time?", options: { "A": "Swimming", "B": "Running", "C": "Cycling", "D": "Swimming and Cycling tied" }, correct: "A", points: 2 },
  { type: "fill", text: "Tally: hammer = 20. Each checkmark = 2. ___ checkmarks represent hammer.", points: 2 },
  { type: "fill", text: "Each dot = 5 students. 8 dots = ___ students.", points: 2 },
  { type: "fill", text: "A barrel contains 18 ℓ. 9 ℓ is used. ___ ℓ remains.", points: 2 },
  { type: "fill", text: "Chris ate 16 fishballs. Ella ate 12. Difference = ___ fishballs.", points: 2 },
  { type: "fill", text: "In a picture graph, each circle = 5. 4 circles = ___.", points: 2 },
  { type: "fill", text: "Aisha collected 12 cans. Ben collected 8 cans. Total = ___ cans.", points: 2 },
  { type: "fill", text: "Sam spent 30 minutes swimming. Each symbol = 10 min. He spent ___ symbols.", points: 2 },
  { type: "fill", text: "If each stand (A) = 1 unit, and Tank A has 5 A, Tank B has 3 A, total is ___ units.", points: 2 },
  { type: "fill", text: "A jug fills 8 glasses. Each glass holds 1 ℓ. The jug holds ___ ℓ.", points: 2 },
  { type: "fill", text: "A beaker with 4 ℓ of water poured into glasses of 1 ℓ each fills ___ glasses.", points: 2 },
  { type: "fill", text: "Tally chart shows butterflies = 15. Each cross = 3. ___ crosses = butterflies.", points: 2 },
  { type: "fill", text: "A tank with 14 ℓ of water pours 6 ℓ into another container. ___ ℓ remains.", points: 2 },
  { type: "fill", text: "If Jug A has 9 ℓ and Jug B has 5 ℓ, the difference is ___ ℓ.", points: 2 },
  { type: "fill", text: "Arrange from smallest: 5 ℓ, 2 ℓ, 8 ℓ. Smallest is ___.", points: 2 },
  { type: "fill", text: "Each box = 6 items. 3 boxes = ___ items.", points: 2 },
  { type: "fill", text: "In a picture graph, if each star = 4, then 6 stars = ___.", points: 2 },
  { type: "fill", text: "Container A has 3 ℓ. Container B has twice as much. B has ___ ℓ.", points: 2 },
  { type: "fill", text: "The amount of water in a container is called its _____.", points: 2 },
  { type: "fill", text: "The greatest volume among 4 ℓ, 7 ℓ, 2 ℓ, 9 ℓ is ___ ℓ.", points: 2 },
  { type: "fill", text: "Picture graph: Apples = 20, Oranges = 15. Total fruit = ___.", points: 2 },
  { type: "essay", text: "Min bought fruits: 12 apples, 8 bananas, 16 oranges. Each apple symbol = 2 fruits. How many apple symbols represent all the fruits?", points: 0 },
  { type: "essay", text: "Tim records favourite sports: Badminton 12, Swimming 8, Karate 6. How many friends were surveyed in total?", points: 0 },
  { type: "essay", text: "Tank A contains 247 ℓ of water. Tank B contains 192 ℓ less than Tank A. What is the total volume of water in both tanks?", points: 0 },
  { type: "essay", text: "The picture graph shows the number of fishballs five children ate. If Aisha ate 15 fishballs and Ben ate 20, how many more did Ben eat than Aisha?", points: 0 },
  { type: "essay", text: "Barrel A contains 210 ℓ of oil. Barrel B contains 86 ℓ less than Barrel A. What is the total volume of oil in both barrels?", points: 0 },
];
let current = 0;
let answers = [];
let score = 0;
const container = document.getElementById('quiz');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');

function updateProgress() {
  const pct = (current / allQuestions.length) * 100;
  progressFill.style.width = pct + '%';
  progressText.textContent = (current + 1) + ' / ' + allQuestions.length;
}

function renderQuestion() {
  if (current >= allQuestions.length) { renderEnd(); return; }
  updateProgress();
  const q = allQuestions[current];
  let html = '<div class="card">';
  html += '<div class="q-type">' + (q.type === 'mc' ? 'Multiple Choice' : q.type === 'fill' ? 'Fill in the Blank' : 'Essay') + '</div>';
  html += '<div class="q-num">Question ' + (current + 1) + ' - ' + q.points + ' point' + (q.points !== 1 ? 's' : '') + '</div>';
  html += '<div class="question">' + q.text + '</div>';
  if (q.type === 'mc') {
    html += '<div class="options">';
    const letters = Object.keys(q.options);
    letters.forEach(function(l) {
      html += '<div class="option disabled" data-letter="' + l + '" onclick="selectMC(this, \'' + l + '\')">' + l + '. ' + q.options[l] + '</div>';
    });
    html += '</div>';
    html += '<button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>Next</button>';
  } else if (q.type === 'fill') {
    html += '<input type="text" id="fillInput" class="option" style="cursor:text;border:2px solid #4f7cff;border-radius:12px;padding:12px 16px;font-size:.95rem;font-family:inherit" placeholder="Type your answer here..." onkeydown="if(event.key==='Enter')submitFill()">';
    html += '<button class="btn" id="fillBtn" onclick="submitFill()">Check Answer</button>';
    setTimeout(function(){ document.getElementById('fillInput').focus(); }, 50);
  } else {
    html += '<textarea id="essayInput" style="width:100%;min-height:120px;padding:12px;border:2px solid #e8eeff;border-radius:12px;font-size:.95rem;font-family:inherit" placeholder="Write your answer here..."></textarea>';
    html += '<button class="btn" onclick="submitEssay()">Submit Answer</button>';
  }
  html += '</div>';
  container.innerHTML = html;
}

function selectMC(el, letter) {
  document.querySelectorAll('.option').forEach(function(o){ o.classList.remove('selected'); });
  el.classList.add('selected');
  document.getElementById('nextBtn').disabled = false;
  var q = allQuestions[current];
  answers[current] = { type: 'mc', answer: letter, correct: letter === q.correct };
}

function nextQuestion() {
  if (!answers[current]) return;
  var q = allQuestions[current];
  if (answers[current].type === 'mc') {
    var correct = q.correct;
    var userAns = answers[current].answer;
    if (userAns === correct) {
      score += q.points;
      document.querySelectorAll('.option').forEach(function(o) {
        if (o.dataset.letter === correct) o.classList.add('correct');
        else o.classList.add('disabled');
      });
    } else {
      document.querySelectorAll('.option').forEach(function(o) {
        if (o.dataset.letter === userAns) o.classList.add('wrong');
        if (o.dataset.letter === correct) o.classList.add('correct');
        o.classList.add('disabled');
      });
    }
  }
  var btnText = current === allQuestions.length - 1 ? 'See Results' : 'Next';
  var btn = document.getElementById('nextBtn');
  btn.textContent = btnText;
  btn.onclick = function() { current++; renderQuestion(); };
}

function submitFill() {
  var input = document.getElementById('fillInput');
  var val = input.value.trim();
  if (!val) return;
  var q = allQuestions[current];
  answers[current] = { type: 'fill', answer: val };
  var correctLower = q.text.toLowerCase();
  var nums = val.match(/\d+/);
  var corrNums = correctLower.match(/\d+/);
  var isCorrect = false;
  if (nums && corrNums && nums[0] === corrNums[0]) isCorrect = true;
  if (isCorrect) { score += q.points; input.style.borderColor = '#28a745'; input.style.background = '#d4edda'; }
  else { input.style.borderColor = '#dc3545'; input.style.background = '#f8d7da'; }
  input.disabled = true;
  document.getElementById('fillBtn').style.display = 'none';
  var btn = document.createElement('button');
  btn.className = 'btn';
  btn.textContent = current === allQuestions.length - 1 ? 'See Results' : 'Next';
  btn.onclick = function() { current++; renderQuestion(); };
  container.appendChild(btn);
}

function submitEssay() {
  var val = document.getElementById('essayInput').value.trim();
  if (!val) return;
  answers[current] = { type: 'essay', answer: val };
  var btn = document.getElementById('quiz').querySelector('.btn');
  btn.textContent = current === allQuestions.length - 1 ? 'See Results' : 'Next';
  btn.onclick = function() { current++; renderQuestion(); };
  btn.disabled = false;
}

function renderEnd() {
  updateProgress();
  var pct = Math.round((score / 100) * 100);
  var html = '<div class="card end-screen">';
  html += '<div class="score">' + score + ' / 100</div>';
  html += '<div class="total">' + pct + '%</div>';
  if (pct >= 85) html += '<div class="pass">Great job, Keeva!</div>';
  else html += '<div class="fail">Keep practicing!</div>';
  html += '<button class="btn" onclick="renderReview()">Review Answers</button>';
  html += '</div>';
  container.innerHTML = html;
}

function renderReview() {
  var html = '<div class="card review"><h2>Review</h2>';
  allQuestions.forEach(function(q, i) {
    var ans = answers[i];
    html += '<div class="review-item">';
    html += '<div class="review-q">' + (i+1) + '. ' + q.text + '</div>';
    if (q.type === 'mc') {
      var correct = q.correct;
      var userAns = ans ? ans.answer : '-';
      if (userAns === correct) html += '<div class="review-ans">Correct: ' + correct + '</div>';
      else html += '<div class="review-wrong">Your answer: ' + userAns + ' | Correct: ' + correct + '</div>';
    } else if (q.type === 'fill') {
      var userAns = ans ? ans.answer : '-';
      html += '<div class="your-ans">Your answer: ' + userAns + '</div>';
    } else {
      var userAns = ans ? ans.answer : '-';
      html += '<div class="your-ans">Your answer: ' + userAns + '</div>';
    }
    html += '</div>';
  });
  html += '<button class="btn" onclick="location.reload()">Try Again</button>';
  html += '</div>';
  container.innerHTML = html;
}

renderQuestion();
</script>
</body>
</html>
