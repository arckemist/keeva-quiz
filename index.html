        const total = quizData.questions.length;

        document.getElementById('q-num').textContent = state.currentQ + 1;

        if (q.image) {
            html += `<img src="${q.image}" alt="Question image" class="q-image">`;
        }
        html += `<span class="section-label ${sectionClass}">${sectionLabel} (${points} pts)</span>`;
        if (q.unit) html += `<span class="unit-label">${q.unit}</span>`;
        html += `<div class="question">${q.q}</div>`;
        
        if (q.type === 'mc') {
            html += `<div class="options">`;
            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, i) => {
                html += `<div class="option" onclick="selectMC(this, ${i})">${letters[i]}. ${opt}</div>`;
            });
            html += `</div><button class="next-btn" id="nextBtn" onclick="nextQ()" disabled>Next</button>`;
        } else if (q.type === 'fill') {
            html += `<div class="fill-blank"><input type="text" id="fillInput" placeholder="Type your answer..." onkeypress="if(event.key==='Enter')checkFill()"></div>`;
            html += `<button class="next-btn" onclick="checkFill()">Check</button>`;
        } else if (q.type === 'essay') {
            html += `<div class="essay"><textarea id="essayInput" placeholder="Write your answer here..."></textarea></div>`;
            html += `<button class="next-btn" onclick="nextQ()">Next</button>`;
        }
        
        html += `</div>`;
        container.innerHTML = html;
        
        if (state.currentQ === total - 1) {
            const card = container.querySelector('.card');
            const submitBtn = document.createElement('button');
            submitBtn.className = 'submit-quiz-btn';
            submitBtn.textContent = 'Submit Quiz';
            submitBtn.onclick = showResults;
            card.appendChild(submitBtn);
        }
    }
    
    function selectMC(el, idx) {
        const q = quizData.questions[state.currentQ];
        document.querySelectorAll('.option').forEach(o => { o.classList.add('disabled'); o.onclick = null; });
        state.answers[state.currentQ] = idx;
        state.answered.add(state.currentQ);
        
        if (idx === q.answer) {
            el.classList.add('correct');
            state.score += 2;
            document.getElementById('score').textContent = state.score;
            createConfetti();
        } else {
            el.classList.add('wrong');
            document.querySelectorAll('.option')[q.answer].classList.add('correct');
        }
        document.getElementById('nextBtn').disabled = false;
    }
    
    function checkFill() {
        const input = document.getElementById('fillInput');
        const q = quizData.questions[state.currentQ];
        const userAns = input.value.trim().toLowerCase();
        const correct = q.answer.toLowerCase();
        
        state.answers[state.currentQ] = input.value;
        state.answered.add(state.currentQ);
        input.disabled = true;
        
        const card = input.parentElement.parentElement;
        
        if (userAns === correct) {
            state.score += 2;
            document.getElementById('score').textContent = state.score;
            input.style.borderColor = '#4caf50';
            createConfetti();
            const feedback = document.createElement('div');
            feedback.className = 'correct-feedback';
            feedback.textContent = 'Correct! Well done!';
            card.appendChild(feedback);
        } else {
            input.style.borderColor = '#f44336';
            const feedback = document.createElement('div');
            feedback.className = 'wrong-feedback';
            feedback.textContent = 'Incorrect. The correct answer is: ' + q.answer;
            card.appendChild(feedback);
        }
        
        setTimeout(nextQ, 2000);
    }
    
    function nextQ() {
        if (quizData.questions[state.currentQ].type === 'essay') {
            const essayInput = document.getElementById('essayInput');
            if (essayInput) {
                state.answers[state.currentQ] = essayInput.value;
            }
        }
        
        state.currentQ++;
        if (state.currentQ < quizData.questions.length) {
            renderQuestion();
        } else {
            showResults();
        }
    }
    
    function createConfetti() {
        const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181', '#aa96da'];
        for (let i = 0; i < 30; i++) {
            setTimeout(() => {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }, i * 30);
        }
    }
    
    function showResults() {
        document.getElementById('quiz-container').innerHTML = '';
        const total = quizData.questions.length;
        const percentage = Math.round((state.score / 100) * 100);
        const passed = percentage >= quizData.passingScore;
        
        let html = `<div id="results"><h2>${passed ? 'CONGRATULATIONS!' : 'Good Try!'}</h2>`;
        html += `<div class="final-score">${state.score}/100 (${percentage}%)</div>`;
        html += `<div class="pass-status ${passed ? 'pass' : 'fail'}">${passed ? 'PASSED! (85% to pass)' : 'Not quite (85% to pass)'}</div>`;
        html += '<button class="btn" onclick="showReview()">Review Answers</button>';
        html += '<button class="btn" style="margin-left:10px" onclick="restartQuiz()">Try Again</button>';
        
        html += '<div id="review-section" class="hidden" style="margin-top:40px;text-align:left">';
        html += '<div class="review-container"><h3 style="color:white;margin-bottom:20px">Full Review</h3>';
        
        html += '<div style="background:white;border-radius:15px;padding:20px;margin:15px 0"><h4 style="color:#1565c0">Multiple Choice (30 questions, 2pts each = 60pts)</h4>';
        let mcNum = 0;
        quizData.questions.forEach((q, i) => {
            if (q.type !== 'mc') return;
            mcNum++;
            const isCorrect = state.answers[i] === q.answer;
            html += `<div class="review-item ${isCorrect ? 'correct-review' : 'wrong-review'}">
                <h4>Q${mcNum}. ${q.q.substring(0, 100)}${q.q.length > 100 ? '...' : ''}</h4>
                <div class="user-answer">Your answer: ${q.options[state.answers[i]] || 'Not answered'}</div>
                <div class="correct-answer">Correct: ${q.options[q.answer]}</div>
            </div>`;
        });
        html += '</div>';
        
        html += '<div style="background:white;border-radius:15px;padding:20px;margin:15px 0"><h4 style="color:#e65100">Fill in the Blank (20 questions, 2pts each = 40pts)</h4>';
        let fillNum = 0;
        quizData.questions.forEach((q, i) => {
            if (q.type !== 'fill') return;
            fillNum++;
            const userAns = state.answers[i] || 'Not answered';
            const isCorrect = (userAns.toString().toLowerCase().trim() === q.answer.toLowerCase().trim());
            html += `<div class="review-item ${isCorrect ? 'correct-review' : 'wrong-review'}">
                <h4>Q${fillNum}. ${q.q.substring(0, 100)}${q.q.length > 100 ? '...' : ''}</h4>
                <div class="user-answer">Your answer: ${userAns}</div>
                <div class="correct-answer">Correct: ${q.answer}</div>
            </div>`;
        });
        html += '</div>';
        
        html += '<div style="background:white;border-radius:15px;padding:20px;margin:15px 0"><h4 style="color:#7b1fa2">Essay (5 questions - Submit for Review)</h4>';
        let essayNum = 0;
        quizData.questions.forEach((q, i) => {
            if (q.type !== 'essay') return;
            essayNum++;
            html += `<div class="review-item">
                <h4>Essay ${essayNum}. ${q.q.substring(0, 100)}${q.q.length > 100 ? '...' : ''}</h4>
                <div class="user-answer">Your answer:<br>${state.answers[i] || 'Not answered'}</div>
                <div class="correct-answer">Model Answer: ${q.answer}</div>
            </div>`;
        });
        html += '</div>';
        
        html += '</div></div></div>';
        
        document.getElementById('results').innerHTML = html;
        document.getElementById('results').classList.remove('hidden');
        
        if (passed) {
            setTimeout(() => createConfetti(), 500);
            setTimeout(() => createConfetti(), 1000);
        }
    }
    
    function showReview() {
        document.getElementById('review-section').classList.toggle('hidden');
    }
    
    function restartQuiz() {
        state = { score: 0, currentQ: 0, answers: [], answered: new Set() };
        document.getElementById('score').textContent = '0';
        document.getElementById('results').classList.add('hidden');
        document.getElementById('results').innerHTML = '';
        renderQuestion();
    }
    
    renderQuestion();
    </script>
</body>
</html>
